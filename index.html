        // === DYNAMIC LOADING WITH CACHE-BUSTING ===
        const CACHE_BUST = Date.now();

        let companies = [];
        let connections = [];

        async function loadData() {
            try {
                const [compRes, connRes] = await Promise.all([
                    fetch(`data/companies.json?v=${CACHE_BUST}`),
                    fetch(`data/connections.json?v=${CACHE_BUST}`)
                ]);
                
                companies = await compRes.json();
                connections = await connRes.json();
                
                console.log(`✅ Loaded ${companies.length} companies + ${connections.length} connections`);
                
                // Update UI counts
                document.getElementById('node-count').innerText = `${companies.length} NODES`;
                document.getElementById('connection-count').innerText = `${connections.length} CONNECTIONS`;
                
                // Initialize graph (your existing initNodes, drawGraph, etc.)
                initNodes();
                drawGraph();
                // ... rest of your initialization code
                
            } catch (e) {
                console.error(e);
                alert("Error loading data. Check console for details.");
            }
        }

        // Your existing functions (initNodes, drawGraph, etc.) go here

        // Boot
        loadData();
    </script>
