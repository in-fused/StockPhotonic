<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHOTONIC NEXUS • Top 500 US Stocks • v5.0 EXPANDED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; background: #050508; color: #e0e7ff; }
        .neon-text { text-shadow: 0 0 10px #00f9ff; }
        canvas { border: 1px solid rgba(0, 249, 255, 0.2); border-radius: 16px; }
    </style>
</head>
<body class="bg-[#050508] text-white">
    <div class="max-w-screen-2xl mx-auto p-8">
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-5xl font-bold tracking-tighter neon-text">PHOTONIC NEXUS</h1>
                <p class="text-xl text-white/60">Top 500 US Stocks • Interconnection Viewer • v5.0 EXPANDED</p>
            </div>
            <div class="text-right">
                <div id="company-count" class="text-3xl font-mono text-emerald-400">0 companies</div>
                <div class="text-xs text-white/50">200+ loaded</div>
            </div>
        </div>

        <div class="flex gap-6">
            <!-- Graph -->
            <div class="flex-1">
                <canvas id="graph-canvas" width="1200" height="700" class="bg-black rounded-3xl"></canvas>
            </div>

            <!-- Sector Panel -->
            <div class="w-72">
                <div class="glass rounded-3xl p-5 border border-white/10">
                    <div class="flex justify-between items-center mb-4">
                        <div class="font-semibold">SECTORS</div>
                        <button onclick="showAll()" class="text-xs px-3 py-1 bg-white/10 rounded-xl">SHOW ALL</button>
                    </div>
                    <div id="sector-list" class="space-y-1 text-sm"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let companies = [];
        let connections = [];
        let nodes = [];
        let links = [];
        let selectedNode = null;
        let offsetX = 0, offsetY = 0, scale = 1;
        let isDragging = false;
        let currentFilter = null;

        async function loadData() {
            try {
                const [compRes, connRes] = await Promise.all([
                    fetch('data/companies.json'),
                    fetch('data/connections.json')
                ]);
                
                companies = await compRes.json();
                connections = await connRes.json();
                
                document.getElementById('company-count').innerHTML = companies.length + ' companies';
                
                initNodes();
                drawGraph();
                setupInteractions();
                populateSectors();
                
                console.log(`✅ Loaded ${companies.length} companies + ${connections.length} connections`);
            } catch (e) {
                console.error(e);
                alert('Error loading data. Make sure data/companies.json and data/connections.json exist.');
            }
        }

        function initNodes() {
            nodes = companies.map((c, i) => {
                const angle = (i / companies.length) * Math.PI * 2;
                const radius = 380 + Math.random() * 220;
                return {
                    ...c,
                    x: 620 + Math.cos(angle) * radius,
                    y: 360 + Math.sin(angle) * radius * 0.75,
                    vx: 0, vy: 0, fx: null, fy: null
                };
            });

            links = connections.map(conn => {
                const source = nodes.find(n => n.id === conn.source);
                const target = nodes.find(n => n.id === conn.target);
                return { ...conn, source, target };
            }).filter(l => l.source && l.target);
        }

        function drawGraph() {
            const canvas = document.getElementById('graph-canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw connections
            ctx.strokeStyle = '#00f9ff';
            ctx.lineWidth = 1.2;
            links.forEach(link => {
                if (!link.source || !link.target) return;
                ctx.beginPath();
                ctx.moveTo(link.source.x * scale + offsetX, link.source.y * scale + offsetY);
                ctx.lineTo(link.target.x * scale + offsetX, link.target.y * scale + offsetY);
                ctx.stroke();
            });

            // Draw nodes
            nodes.forEach(node => {
                if (currentFilter && node.sector !== currentFilter) return;
                
                const x = node.x * scale + offsetX;
                const y = node.y * scale + offsetY;
                const size = Math.max(6, Math.sqrt(node.market_cap || 0.3) * 4);

                ctx.fillStyle = node.color || '#00f9ff';
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();

                // Label
                ctx.fillStyle = '#ffffff';
                ctx.font = '11px monospace';
                ctx.fillText(node.ticker, x - 18, y + size + 16);
            });
        }

        function setupInteractions() {
            const canvas = document.getElementById('graph-canvas');
            
            canvas.addEventListener('mousedown', (e) => {
                const rect = canvas.getBoundingClientRect();
                const mx = e.clientX - rect.left;
                const my = e.clientY - rect.top;

                let found = null;
                for (let node of nodes) {
                    const nx = node.x * scale + offsetX;
                    const ny = node.y * scale + offsetY;
                    const dist = Math.hypot(nx - mx, ny - my);
                    if (dist < 45) { found = node; break; }
                }

                if (found) {
                    selectedNode = found;
                    console.log('Selected:', found.ticker);
                    // Simple drag start
                    isDragging = true;
                    found.fx = found.x;
                    found.fy = found.y;
                }
            });

            canvas.addEventListener('mousemove', (e) => {
                if (!isDragging || !selectedNode) return;
                const rect = canvas.getBoundingClientRect();
                const mx = (e.clientX - rect.left - offsetX) / scale;
                const my = (e.clientY - rect.top - offsetY) / scale;
                selectedNode.x = mx;
                selectedNode.y = my;
                drawGraph();
            });

            canvas.addEventListener('mouseup', () => {
                isDragging = false;
                if (selectedNode) {
                    selectedNode.fx = null;
                    selectedNode.fy = null;
                }
            });

            // Simple pan
            let isPanning = false, startX, startY;
            canvas.addEventListener('mousedown', (e) => {
                if (e.button === 2) { // Right click to pan
                    isPanning = true;
                    startX = e.clientX - offsetX;
                    startY = e.clientY - offsetY;
                }
            });
            
            canvas.addEventListener('mousemove', (e) => {
                if (isPanning) {
                    offsetX = e.clientX - startX;
                    offsetY = e.clientY - startY;
                    drawGraph();
                }
            });
            
            canvas.addEventListener('mouseup', () => isPanning = false);
        }

        function populateSectors() {
            const container = document.getElementById('sector-list');
            const sectors = [...new Set(companies.map(c => c.sector))].sort();
            
            container.innerHTML = sectors.map(s => {
                const count = companies.filter(c => c.sector === s).length;
                return `<div onclick="filterSector('${s}')" class="px-3 py-1.5 hover:bg-white/10 rounded-xl cursor-pointer flex justify-between">
                    <span>${s}</span> <span class="text-xs text-white/50">${count}</span>
                </div>`;
            }).join('');
        }

        function filterSector(sector) {
            currentFilter = sector;
            drawGraph();
        }

        function showAll() {
            currentFilter = null;
            drawGraph();
        }

        // Boot
        loadData();
    </script>
</body>
</html>
