<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHOTONIC NEXUS • Top 500 US Stocks • v5.4 FIXED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        
        :root {
            --neon-cyan: #00f9ff;
            --neon-magenta: #ff00aa;
            --neon-purple: #c026d3;
            --neon-green: #00ff9f;
            --neon-gold: #ffd700;
            --neon-orange: #ff6b00;
        }
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
            background: #050508;
            color: #e0e7ff;
            overflow-x: hidden;
        }
        
        .font-display {
            font-family: 'Space Grotesk', 'Inter', sans-serif;
            font-weight: 600;
            letter-spacing: -0.025em;
        }

        .neon-text {
            text-shadow: 
                0 0 5px #00f9ff,
                0 0 10px #00f9ff,
                0 0 20px #ff00aa,
                0 0 40px #c026d3;
        }

        .glass {
            background: rgba(10, 12, 25, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 249, 255, 0.15);
        }

        .graph-container {
            box-shadow: 0 0 60px rgba(0, 249, 255, 0.08);
            border: 1px solid rgba(0, 249, 255, 0.1);
        }
    </style>
</head>
<body class="photonic-bg">
    <!-- HEADER (same as before) -->
    <header class="border-b border-white/10 bg-black/60 backdrop-blur-xl sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-8 py-5 flex items-center justify-between">
            <div class="flex items-center gap-x-4">
                <div class="flex items-center gap-x-3">
                    <div class="w-11 h-11 rounded-2xl bg-gradient-to-br from-cyan-400 via-violet-500 to-fuchsia-500 flex items-center justify-center relative">
                        <i class="fa-solid fa-atom text-white text-3xl"></i>
                    </div>
                    <div>
                        <div class="font-display text-3xl font-semibold tracking-tighter neon-text">PHOTONIC NEXUS</div>
                        <div class="text-[10px] text-cyan-400 -mt-1 tracking-[3px] font-mono">TOP 500 • US MARKETS • 2026 • v5.4 FIXED</div>
                    </div>
                </div>
            </div>
            
            <div class="flex items-center gap-x-3 text-sm">
                <div class="flex items-center gap-x-2 px-4 py-1.5 rounded-3xl bg-white/5 border border-white/10">
                    <div class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div>
                    <span class="font-mono text-emerald-400 text-xs tracking-widest">LIVE • APR 29 2026</span>
                </div>
                
                <button onclick="resetAll()" class="px-4 py-2 text-xs rounded-3xl border border-white/20 hover:bg-white/5 flex items-center gap-x-2">
                    <i class="fa-solid fa-undo"></i>
                    <span>RESET</span>
                </button>
            </div>
        </div>
    </header>

    <div class="max-w-screen-2xl mx-auto px-8 pt-6">
        <div class="flex items-end justify-between mb-6">
            <div>
                <h1 class="font-display text-6xl font-semibold tracking-tighter">Photonic Chart</h1>
                <p class="text-xl text-white/70 mt-1">Interactive visualization of interconnections across the <span class="font-semibold text-white">Top 500 US-listed stocks</span></p>
            </div>
            
            <div class="text-right">
                <div class="text-sm text-white/60">TOTAL MARKET CAP</div>
                <div class="font-display text-4xl font-semibold tabular-nums">$73.3T</div>
            </div>
        </div>

        <!-- CONTROLS -->
        <div class="glass rounded-3xl p-4 mb-6 flex flex-wrap items-center gap-3 border border-white/10">
            <div class="flex-1">
                <input id="search-input" type="text" placeholder="Search ticker or company..." 
                       class="w-full bg-black/40 border border-white/20 focus:border-cyan-400 text-white placeholder:text-white/40 pl-11 py-3 rounded-3xl text-sm"
                       onkeyup="filterGraph()">
            </div>
            
            <select id="sector-filter" onchange="filterGraph()" class="bg-black/40 border border-white/20 text-white text-sm rounded-3xl px-4 py-3">
                <option value="">All Sectors</option>
                <option value="Semiconductors">Semiconductors</option>
                <option value="Software">Software</option>
                <option value="Consumer">Consumer</option>
                <option value="Financials">Financials</option>
                <option value="Healthcare">Healthcare</option>
                <option value="Energy">Energy</option>
                <option value="Industrials">Industrials</option>
            </select>
            
            <div class="ml-auto flex items-center gap-x-px text-xs font-mono text-white/50">
                <div id="node-count" class="px-3 py-1 bg-white/5 rounded-l-3xl">300 NODES</div>
                <div id="connection-count" class="px-3 py-1 bg-white/5">600 CONNECTIONS</div>
                <div class="px-3 py-1 bg-emerald-400/10 text-emerald-400 rounded-r-3xl">LIVE</div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- GRAPH -->
            <div class="lg:col-span-8">
                <div class="glass rounded-3xl p-3 graph-container relative overflow-hidden" style="height: 680px;">
                    <canvas id="graph-canvas" width="1200" height="680" class="w-full h-full rounded-3xl cursor-grab active:cursor-grabbing"></canvas>
                </div>
            </div>

            <!-- SIDEBAR -->
            <div class="lg:col-span-4">
                <div id="sidebar" class="glass rounded-3xl p-6 border border-white/10 h-full hidden">
                    <!-- Sidebar content -->
                </div>
                <div id="empty-sidebar" class="glass rounded-3xl p-8 border border-white/10 h-full flex flex-col items-center justify-center text-center">
                    <i class="fa-solid fa-project-diagram text-5xl text-white/20 mb-4"></i>
                    <div class="font-semibold text-white/60">Click any node to explore</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let companies = [];
        let connections = [];
        let nodes = [];
        let links = [];
        let selectedNode = null;
        let offsetX = 0, offsetY = 0, scale = 1;
        let isDragging = false;
        let currentFilter = null;

        const CACHE_BUST = Date.now();

        async function loadData() {
            const [compRes, connRes] = await Promise.all([
                fetch(`data/companies.json?v=${CACHE_BUST}`),
                fetch(`data/connections.json?v=${CACHE_BUST}`)
            ]);
            
            companies = await compRes.json();
            connections = await connRes.json();
            
            console.log(`✅ Loaded ${companies.length} companies + ${connections.length} connections`);
            
            document.getElementById('node-count').innerText = `${companies.length} NODES`;
            document.getElementById('connection-count').innerText = `${connections.length} CONNECTIONS`;
            
            initNodes();
            drawGraph();
            setupCanvasInteractions();
        }

        function initNodes() {
            nodes = companies.map((c, i) => {
                const angle = (i / companies.length) * Math.PI * 2;
                const radius = 520 + Math.random() * 280; // Better spread for large graphs
                return {
                    ...c,
                    x: 620 + Math.cos(angle) * radius,
                    y: 360 + Math.sin(angle) * radius * 0.75,
                    vx: 0, vy: 0, fx: null, fy: null
                };
            });

            links = connections.map(conn => {
                const source = nodes.find(n => n.id === conn.source);
                const target = nodes.find(n => n.id === conn.target);
                return { ...conn, source, target };
            }).filter(l => l.source && l.target);
        }

        function drawGraph() {
            const canvas = document.getElementById('graph-canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw connections with different colors
            links.forEach(link => {
                if (!link.source || !link.target) return;
                
                let color = '#00f9ff';
                if (link.type === 'partnership') color = '#ff00aa';
                if (link.type === 'supply') color = '#00ff9f';
                if (link.type === 'ecosystem') color = '#ffd700';
                if (link.type === 'competitor') color = '#ff6b00';
                if (link.type === 'investment') color = '#c026d3';
                
                ctx.strokeStyle = color;
                ctx.lineWidth = Math.max(0.8, link.strength * 2.2);
                ctx.shadowBlur = 6;
                ctx.shadowColor = color;
                
                ctx.beginPath();
                ctx.moveTo(link.source.x * scale + offsetX, link.source.y * scale + offsetY);
                ctx.lineTo(link.target.x * scale + offsetX, link.target.y * scale + offsetY);
                ctx.stroke();
            });

            // Draw nodes
            nodes.forEach(node => {
                if (currentFilter && node.sector !== currentFilter) return;
                
                const x = node.x * scale + offsetX;
                const y = node.y * scale + offsetY;
                const size = Math.max(5, Math.sqrt(node.market_cap || 0.3) * 3.5);

                ctx.fillStyle = node.color || '#00f9ff';
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#ffffff';
                ctx.font = '10px monospace';
                ctx.fillText(node.ticker, x - 16, y + size + 14);
            });
        }

        function setupCanvasInteractions() {
            const canvas = document.getElementById('graph-canvas');
            
            canvas.addEventListener('mousedown', (e) => {
                const rect = canvas.getBoundingClientRect();
                const mx = e.clientX - rect.left;
                const my = e.clientY - rect.top;

                let found = null;
                for (let node of nodes) {
                    const nx = node.x * scale + offsetX;
                    const ny = node.y * scale + offsetY;
                    const dist = Math.hypot(nx - mx, ny - my);
                    if (dist < 42) { found = node; break; }
                }

                if (found) {
                    selectedNode = found;
                    showNodeDetails(found);
                    isDragging = true;
                    found.fx = found.x;
                    found.fy = found.y;
                }
            });

            canvas.addEventListener('mousemove', (e) => {
                if (!isDragging || !selectedNode) return;
                const rect = canvas.getBoundingClientRect();
                const mx = (e.clientX - rect.left - offsetX) / scale;
                const my = (e.clientY - rect.top - offsetY) / scale;
                selectedNode.x = mx;
                selectedNode.y = my;
                drawGraph();
            });

            canvas.addEventListener('mouseup', () => {
                isDragging = false;
                if (selectedNode) {
                    selectedNode.fx = null;
                    selectedNode.fy = null;
                }
            });

            // Simple pan with right mouse
            let isPanning = false;
            let startX, startY;

            canvas.addEventListener('mousedown', (e) => {
                if (e.button === 2) {
                    isPanning = true;
                    startX = e.clientX - offsetX;
                    startY = e.clientY - offsetY;
                }
            });

            canvas.addEventListener('mousemove', (e) => {
                if (isPanning) {
                    offsetX = e.clientX - startX;
                    offsetY = e.clientY - startY;
                    drawGraph();
                }
            });

            canvas.addEventListener('mouseup', () => isPanning = false);
            canvas.addEventListener('contextmenu', e => e.preventDefault());
        }

        function showNodeDetails(node) {
            // Simple sidebar implementation
            alert(`Selected: ${node.ticker} - ${node.name}\nSector: ${node.sector}\nMarket Cap: $${node.market_cap}T`);
        }

        function filterGraph() {
            currentFilter = document.getElementById('sector-filter').value || null;
            drawGraph();
        }

        function resetAll() {
            location.reload();
        }

        // Boot
        loadData();
    </script>
</body>
</html>
